<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="vote.html">Greater Grace Edu. Consults</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <a href="vote.html" class="btn nav-btn nav-btn-outline">Back to Voting</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="success-container animate-fade-in">
            <div class="success-icon-wrapper">
                <i class="bi bi-check-lg success-icon"></i>
            </div>
            <h1 class="success-title">Payment Successful!</h1>
            <p class="success-message">
                Thank you for your support.<br>
                <span id="message"></span>
            </p>
            <a href="vote.html" class="btn btn-pay d-inline-block px-5">Return to Voting Page</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const votes = params.get('votes');
        const name = params.get('name');
        
        if (votes && name) {
            document.getElementById('message').innerHTML = `You have successfully added <strong>${votes} vote${votes > 1 ? 's' : ''}</strong> to <strong>${name}</strong>.`;
        } else {
            document.getElementById('message').innerText = 'Your vote has been recorded.';
        }
    </script>
</body>

</html>
