<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Fix Me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">Fix Me Initiative</a>
            <div>
                <a href="index.html" class="btn btn-outline-light btn-sm">About</a>
                <a href="vote.html" class="btn btn-light btn-sm">Vote Now</a>
            </div>
        </div>
    </nav>

    <div style="text-align: center; font-family: sans-serif; padding-top: 50px;">
        <h1 style="color: green;">Payment Successful!</h1>
        <p>Thank you for voting.</p>
        <p id="message"></p>
        <a href="vote.html">Return to Voting Page</a>

    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const votes = params.get('votes');
        const name = params.get('name');
        document.getElementById('message').innerText = `You have successfully added ${votes} votes to ${name}.`;
    </script>
</body>
</html>
