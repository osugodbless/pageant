<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Fix Me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">Fix Me Initiative</a>
            <div>
                <a href="index.html" class="btn btn-outline-light btn-sm">About</a>
                <a href="vote.html" class="btn btn-light btn-sm">Vote Now</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-4">Vote for <span style="color: #198754; font-size: larger; font-family: 'Courier New', Courier, monospace;">Miss/Mr. Intellect</span></h2>
        <p class="text-center text-muted">1 Vote = ₦100. You can vote multiple times!</p>
        
        <div class="row" id="contestant-list">
            <div class="text-center">Loading contestants...</div>
        </div>
    </div>

    <div class="modal fade" id="voteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cast Your Vote</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Voting for: <strong id="modal-candidatename"></strong></p>
                    <form id="voteForm">
                        <input type="hidden" id="modal-candidateid">
                        <div class="mb-3">
                            <label>Your Name</label>
                            <input type="text" class="form-control" id="voter-name" required placeholder="Enter your full name">
                        </div>
                        <div class="mb-3">
                            <label>Your Email Address</label>
                            <input type="email" class="form-control" id="voter-email" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label>Amount to Spend (₦)</label>
                            <input type="number" class="form-control" id="voter-amount" min="100" value="100" required>
                            <small class="text-success" id="vote-count-preview">Equals 1 Vote</small>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Proceed to Pay</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Fetch Contestants on Page Load
        fetch('/api/contestants')
            .then(res => res.json())
            .then(data => {
                console.log("MY DATA:", data);
                const list = document.getElementById('contestant-list');
                list.innerHTML = ''; // Clear loading text
                data.forEach(c => {
                    list.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 shadow-sm">
                                <img src="${c.image}" class="card-img-top" alt="${c.name}">
                                <div class="card-body text-center">
                                    <h5 class="card-title">${c.name}</h5>
                                    <p class="text-muted small">${c.school}</p>
                                    <p class="card-text">${c.bio}</p>
                                    <div class="badge bg-warning text-dark mb-3 fs-6">Votes: ${c.votes}</div>
                                    <br>
                                    <button class="btn btn-outline-success" onclick="openVoteModal('${c.id}', '${c.name}')">Vote for Me</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });

        // 2. Handle Vote Modal
        function openVoteModal(id, name) {
            document.getElementById('modal-candidateid').value = id;
            document.getElementById('modal-candidatename').innerText = name;
            new bootstrap.Modal(document.getElementById('voteModal')).show();
        }

        // 3. Update "Equals X Votes" text dynamically
        document.getElementById('voter-amount').addEventListener('input', function(e) {
            const votes = Math.floor(e.target.value / 100);
            document.getElementById('vote-count-preview').innerText = `Equals ${votes} Votes`;
        });

        // 4. Submit Payment Request
        document.getElementById('voteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('modal-candidateid').value;
            const email = document.getElementById('voter-email').value;
            const amount = document.getElementById('voter-amount').value;

            // Send to Backend
            fetch('/api/vote/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contestantId: id, name, email, amount })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status) {
                    // Redirect user to Paystack
                    window.location.href = data.url;
                } else {
                    alert('Error initializing payment.');
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
